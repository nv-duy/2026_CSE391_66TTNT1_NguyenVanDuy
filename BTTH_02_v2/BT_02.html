<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel goals</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Raleway:wght@700&family=Oleo+Script:wght@700&family=Quicksand:wght@300;500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style_02.css">
</head>

<body>
    <div class="background-1">
        <header>
            <h3 class="title-1">TRAVEL GOALS</h3>
            <nav>
                <ul class="navbar">
                    <li><a href="">Destinations</a></li>
                    <li><a href="">About</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section class="hero">
                <div class="discover">
                    <h3 class="title-2">JOE'S TRAVEL PAGE</h3>
                    <p>LET'S EXPLORE THE WORLD TOGETHER</p>
                    <button class="discover-places">Discover places</button>
                </div>
            </section>
    </div>
    <div class="background-2">
        <section class="highlights">
            <h3 class="title-3">HIGHLIGHTS</h3>

            <div class="place-img">
                <img src="/BTTH_02_v2/img_BT_02/place-imgs/miami.jpg" alt="miami-usa">
                <img src="/BTTH_02_v2/img_BT_02/place-imgs/munich.jpg" alt="munich-germany">
                <img src="/BTTH_02_v2/img_BT_02/place-imgs/barcelona.jpg" alt="barcelona-spain">
            </div>
            <div class="name-place">
                <p>MIAMI <span style="color: #0d6145; font-weight: bold; margin-left: 3px;">USA</span></p>
                <p>MUNICH <span style="color: #0d6145; font-weight: bold; margin-left: 3px;">GERMANY</span></p>
                <p>BARCELONA <span style="color: #0d6145; font-weight: bold; margin-left: 3px;">SPAIN</span></p>
            </div>
        </section>
    </div>
    </main>
    <footer>
        <div class="social-icon">
            <a href="" target="_blank">
                <img src="/BTTH_02_v2/img_BT_02/social-icons/insta.png" alt="instagram">
            </a>
            <a href="" target="_blank">
                <img src="/BTTH_02_v2/img_BT_02/social-icons/facebook.png" alt="facebook">
            </a>
        </div>
    </footer>
</body>

</html>
